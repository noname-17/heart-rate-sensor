<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PulseTrack - Heart Rate Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #ff4b5c, #ff6b81);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 30px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
      opacity: 0.9;
    }

    video {
      width: 100%;
      border-radius: 20px;
      background: black;
      margin-bottom: 20px;
    }

    .heart {
      font-size: 70px;
      animation: beat 1s infinite;
      margin: 10px 0;
    }

    @keyframes beat {
      0% { transform: scale(1); }
      25% { transform: scale(1.15); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .bpm {
      font-size: 3rem;
      font-weight: bold;
      margin: 15px 0;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      background: white;
      color: #ff4b5c;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.05);
    }

    .status {
      margin-top: 15px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    canvas {
      display: none;
    }

    .instructions {
      margin-top: 20px;
      background: rgba(255,255,255,0.15);
      padding: 15px;
      border-radius: 15px;
      text-align: left;
      font-size: 0.9rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>❤️ PulseTrack</h1>
    <p>Heart Rate Detection Using Mobile Camera</p>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <div class="heart">❤️</div>

    <div class="bpm" id="bpm">-- BPM</div>

    <button onclick="startDetection()">Start Detection</button>

    <div class="status" id="status">
      Waiting to start...
    </div>

    <div class="instructions">
      <strong>Instructions:</strong><br>
      1. Allow camera permission.<br>
      2. Place your finger gently on the rear camera.<br>
      3. Turn on flashlight if available.<br>
      4. Stay still for 15-20 seconds.<br>
      5. BPM will appear automatically.
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const bpmDisplay = document.getElementById('bpm');
    const statusText = document.getElementById('status');

    let samples = [];
    let timestamps = [];
    let stream = null;
    let track = null;
    let detecting = false;

    async function startDetection() {
      try {
        statusText.innerText = 'Accessing camera...';

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' },
            width: { ideal: 640 },
            height: { ideal: 480 }
          },
          audio: false
        });

        video.srcObject = stream;
        track = stream.getVideoTracks()[0];

        await enableTorch();

        samples = [];
        timestamps = [];
        detecting = true;

        statusText.innerText = 'Place finger fully on camera and flash...';

        setTimeout(() => {
          requestAnimationFrame(processFrame);
        }, 2000);

      } catch (err) {
        console.error(err);
        statusText.innerText = 'Camera or flash not supported on this device.';
      }
    }

    async function enableTorch() {
      try {
        const capabilities = track.getCapabilities();

        if (capabilities.torch) {
          await track.applyConstraints({
            advanced: [{ torch: true }]
          });

          statusText.innerText = 'Flashlight enabled.';
        }
      } catch (e) {
        console.log('Torch not available');
      }
    }

    function processFrame() {
      if (!detecting) return;

      if (video.videoWidth === 0) {
        requestAnimationFrame(processFrame);
        return;
      }

      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = frame.data;

      let red = 0;
      let green = 0;
      let blue = 0;

      for (let i = 0; i < data.length; i += 4) {
        red += data[i];
        green += data[i + 1];
        blue += data[i + 2];
      }

      const pixels = data.length / 4;
      red /= pixels;
      green /= pixels;
      blue /= pixels;

      const intensity = red - (green + blue) / 2;

      if (red < 80) {
        statusText.innerText = 'Cover camera fully with finger.';
        requestAnimationFrame(processFrame);
        return;
      }

      samples.push(intensity);
      timestamps.push(Date.now());

      if (samples.length > 250) {
        samples.shift();
        timestamps.shift();
      }

      calculateBPM();

      requestAnimationFrame(processFrame);
    }

    function calculateBPM() {
      if (samples.length < 100) return;

      const smoothed = [];

      for (let i = 2; i < samples.length - 2; i++) {
        const avg = (
          samples[i - 2] +
          samples[i - 1] +
          samples[i] +
          samples[i + 1] +
          samples[i + 2]
        ) / 5;

        smoothed.push(avg);
      }

      let peaks = [];

      for (let i = 1; i < smoothed.length - 1; i++) {
        if (
          smoothed[i] > smoothed[i - 1] &&
          smoothed[i] > smoothed[i + 1] &&
          smoothed[i] > 5
        ) {
          peaks.push(i);
        }
      }

      if (peaks.length < 2) return;

      let intervals = [];

      for (let i = 1; i < peaks.length; i++) {
        const t1 = timestamps[peaks[i - 1]];
        const t2 = timestamps[peaks[i]];
        intervals.push(t2 - t1);
      }

      const avgInterval = intervals.reduce((a, b) => a + b, 0) / intervals.length;

      const bpm = Math.round(60000 / avgInterval);

      if (bpm >= 45 && bpm <= 160) {
        bpmDisplay.innerText = bpm + ' BPM';
        statusText.innerText = 'Heart rate detected successfully';
      }
    }
  </script>

</body>
</html>
